const{useState,useEffect,useRef,useCallback}=React;

function mkStars(n){const s=[];let seed=77;const r=()=>{seed=(seed*16807)%2147483647;return seed/2147483647};for(let i=0;i<n;i++)s.push({x:r(),y:r(),sz:.3+r()*1.5,sp:.2+r()*1.8,ph:r()*Math.PI*2});return s}
const STARS=mkStars(90);
const MODES={lucid:{name:"Lucid",sub:"The world becomes music",accent:"#D4A574",rgb:"212,165,116",bg:"#0A0D14"},liminal:{name:"Liminal",sub:"Moments echo forward and back",accent:"#7B9DB8",rgb:"123,157,184",bg:"#060D1A"}};

}

function Lucid(){
  const[started,setStarted]=useState(false),[mode,setMode]=useState("lucid"),[loading,setLoading]=useState(false);
  const[error,setError]=useState(null),[showUI,setShowUI]=useState(true),[vis,setVis]=useState({energy:0,moments:0,phase:""});

      ctx.fillStyle=md.bg;ctx.fillRect(0,0,w,h);
      const bg=ctx.createRadialGradient(w*.5,h*.4,0,w*.5,h*.4,Math.max(w,h)*.7);bg.addColorStop(0,"rgba(30,25,20,0.15)");bg.addColorStop(1,"transparent");ctx.fillStyle=bg;ctx.fillRect(0,0,w,h);
      for(const star of STARS){ctx.globalAlpha=(.25+.35*Math.sin(t*star.sp+star.ph)+en*.25)*.55;ctx.fillStyle=m==="lucid"?"#E8D5C0":"#C0D0E0";ctx.beginPath();ctx.arc(star.x*w,star.y*h,star.sz*(.7+en*.5),0,Math.PI*2);ctx.fill()}ctx.globalAlpha=1;
      const cx=w/2,cy=h*.42,baseR=Math.min(w,h)*.14;

      if(m==="lucid"){
        for(let b=0;b<5;b++){const bandY=cy-baseR+(b/5)*baseR*2.2,amp=6+en*28+Math.sin(t*.25+b*1.1)*5,hue=(28+b*13+Math.sin(t*.018+b)*16)%360;
        ctx.beginPath();for(let x=0;x<=w;x+=3){const y=bandY+Math.sin(x*.007+t*.22+b*1.4)*amp+Math.sin(x*.013+t*.15+b*2.2)*amp*.4;x===0?ctx.moveTo(x,y):ctx.lineTo(x,y)}
        for(let x=w;x>=0;x-=3){const y=bandY+14+Math.sin(x*.007+t*.22+b*1.4+.5)*amp+Math.sin(x*.013+t*.15+b*2.2+.3)*amp*.4;ctx.lineTo(x,y)}
        ctx.closePath();ctx.fillStyle="hsla("+hue+","+(38+en*28)+"%,"+(42+en*22)+"%,"+(0.035+en*.05)+")";ctx.fill()}
        if(eng.pool){for(let i=0;i<eng.pool.length;i++){const age=Math.min(1,(t-eng.pool[i].capturedAt)/30),angle=(i/Math.max(eng.pool.length,1))*Math.PI*2+t*.03;
        const orbit=baseR*(1.2+i*.08),px=cx+Math.cos(angle)*orbit,py=cy+Math.sin(angle)*orbit,played=t-eng.pool[i].lastPlayed<1;
        const sz=played?4+Math.sin(t*8)*2:1.5+age,al=played?.7:.15+(1-age)*.25;ctx.beginPath();ctx.arc(px,py,sz,0,Math.PI*2);ctx.fillStyle="rgba("+md.rgb+","+al+")";
        if(played){ctx.shadowBlur=15;ctx.shadowColor=md.accent}ctx.fill();ctx.shadowBlur=0}}
        for(let i=0;i<20;i++){const bin=Math.floor((PENTA[i]/2000)*s.outFFT.length),act=Math.max(0,((s.outFFT[Math.min(bin,s.outFFT.length-1)]||(-100))+75)/75);if(act<.04)continue;
        const angle=(i/20)*Math.PI*2+t*.04+Math.sin(t*.011+i)*.3,orbit=baseR*(.6+(i%5)*.13)+act*18;
        ctx.beginPath();ctx.arc(cx+Math.cos(angle)*orbit,cy+Math.sin(angle)*orbit,1.2+act*3.5,0,Math.PI*2);ctx.fillStyle="rgba("+md.rgb+","+act*.65+")";ctx.shadowBlur=act*12;ctx.shadowColor=md.accent;ctx.fill();ctx.shadowBlur=0}
      }else{
        for(let r=0;r<10;r++){const phase=(t*.06+r/10)%1,radius=baseR*.2+phase*baseR*2.8,alpha=(1-phase)*(.05+en*.12);if(alpha<.01)continue;
        ctx.beginPath();for(let i=0;i<=80;i++){const a=(i/80)*Math.PI*2,wob=Math.sin(a*3+t*.35+r)*3*en+Math.sin(a*5+t*.2+r*2)*2*en;ctx.lineTo(cx+Math.cos(a)*(radius+wob),cy+Math.sin(a)*(radius+wob))}
        ctx.closePath();ctx.strokeStyle="rgba("+md.rgb+","+alpha+")";ctx.lineWidth=1;ctx.stroke()}
        const gR=baseR*(.35+en*.4),glow=ctx.createRadialGradient(cx,cy,0,cx,cy,gR);glow.addColorStop(0,"rgba("+md.rgb+","+(0.06+en*.1)+")");glow.addColorStop(1,"transparent");ctx.fillStyle=glow;ctx.beginPath();ctx.arc(cx,cy,gR,0,Math.PI*2);ctx.fill();
      }
      const glowR=baseR*(.7+en*.5),cGlow=ctx.createRadialGradient(cx,cy,0,cx,cy,glowR);cGlow.addColorStop(0,"rgba("+md.rgb+","+(0.06+en*.1)+")");cGlow.addColorStop(.5,"rgba("+md.rgb+","+(0.015+en*.03)+")");cGlow.addColorStop(1,"transparent");ctx.fillStyle=cGlow;ctx.fillRect(cx-glowR,cy-glowR,glowR*2,glowR*2);
      const vig=ctx.createRadialGradient(cx,h*.45,Math.min(w,h)*.25,cx,h*.45,Math.max(w,h)*.8);vig.addColorStop(0,"transparent");vig.addColorStop(1,"rgba(0,0,0,0.5)");ctx.fillStyle=vig;ctx.fillRect(0,0,w,h);
    };draw();return()=>{cancelAnimationFrame(animRef.current);window.removeEventListener("resize",resize)};
  },[started]);

  useEffect(()=>()=>stopAudio(),[stopAudio]);
  const md=MODES[mode];

  if(!started){return(
    <div style={S.root}><div style={S.landing}>
      <div style={{marginBottom:56}}><div style={S.tag}>GENERATIVE AUDIO</div><h1 style={S.title}>Lucid</h1>
      <p style={S.desc}>Your environment, resynthesized into a living composition. Put on headphones — the world around you becomes the instrument.</p></div>
      <div style={{display:"flex",gap:12,marginBottom:48}}>
        {Object.entries(MODES).map(([k,v])=><button key={k} onClick={()=>setMode(k)} style={{...S.pill,borderColor:mode===k?v.accent:"rgba(255,255,255,0.08)",background:mode===k?v.accent+"18":"rgba(255,255,255,0.03)",color:mode===k?v.accent:"#667"}}>
          <div style={{width:6,height:6,borderRadius:"50%",background:mode===k?v.accent:"#444",marginBottom:5}}/><div style={{fontSize:11,letterSpacing:1.5}}>{v.name.toUpperCase()}</div><div style={{fontSize:9,color:mode===k?v.accent+"AA":"#445",marginTop:3}}>{v.sub}</div></button>)}
      </div>
      {error&&<p style={S.error}>{error}</p>}
      <button onClick={startAudio} disabled={loading} style={{...S.begin,opacity:loading?.5:1}}>{loading?"Listening...":"Begin"}</button>
      <p style={S.note}>🎧 Headphones required</p>
    </div></div>)}

  return(
    <div style={S.root} onClick={()=>setShowUI(u=>!u)}>
      <canvas ref={canvasRef} style={S.canvas}/>
      <div style={{...S.label,opacity:showUI?1:0}}>
        <div style={{fontSize:9,letterSpacing:3,color:md.accent,marginBottom:3}}>{md.name.toUpperCase()}</div>
        <div style={{fontFamily:"'Instrument Serif',serif",fontSize:24,color:"#E8E4DE"}}>{md.sub}</div>
        {mode==="lucid"&&<div style={{fontSize:9,color:"#445",marginTop:6}}>{vis.moments>0?vis.moments+" moments captured":"listening..."}{vis.phase==="settling"?" · settling in":""}</div>}
      </div>
      <div style={{...S.ctrls,opacity:showUI?1:0,transform:showUI?"none":"translateY(16px)",pointerEvents:showUI?"auto":"none"}}>
        <div style={{display:"flex",gap:10}}>
          {Object.entries(MODES).map(([k,v])=><button key={k} onClick={e=>{e.stopPropagation();switchMode(k)}} style={{...S.mBtn,borderColor:mode===k?v.accent:"rgba(255,255,255,0.08)",background:mode===k?v.accent+"20":"rgba(255,255,255,0.03)",color:mode===k?v.accent:"#556"}}>
            <div style={{width:5,height:5,borderRadius:"50%",background:mode===k?v.accent:"#444",marginBottom:4}}/>{v.name.toUpperCase()}</button>)}
        </div>
        <button onClick={e=>{e.stopPropagation();stopAudio()}} style={S.stop}>STOP</button>
      </div>
      {showUI&&<div style={S.hint}>tap to toggle</div>}
    </div>);
}

const S={
  root:{position:"fixed",inset:0,background:"#0A0D14",overflow:"hidden",userSelect:"none",WebkitUserSelect:"none"},
  canvas:{position:"absolute",inset:0,width:"100%",height:"100%"},
  landing:{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",padding:"40px 24px",textAlign:"center"},
  tag:{fontFamily:"'Azeret Mono',monospace",fontSize:9,letterSpacing:4,color:"#556",marginBottom:12},
  title:{fontFamily:"'Instrument Serif',serif",fontSize:56,fontWeight:400,color:"#E8E4DE",margin:0,lineHeight:1.1},
  desc:{fontFamily:"'Azeret Mono',monospace",fontSize:12,lineHeight:1.8,color:"#667",maxWidth:300,margin:"16px auto 0",fontWeight:300},
  pill:{display:"flex",flexDirection:"column",alignItems:"center",padding:"14px 18px 12px",borderRadius:12,border:"1px solid",cursor:"pointer",fontFamily:"'Azeret Mono',monospace",transition:"all .4s ease",background:"none",minWidth:130},
  begin:{fontFamily:"'Instrument Serif',serif",fontSize:20,color:"#E8E4DE",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:50,padding:"14px 56px",cursor:"pointer",letterSpacing:3},
  note:{fontSize:10,color:"#445",marginTop:14,fontFamily:"'Azeret Mono',monospace"},
  error:{color:"#C07070",fontSize:11,marginBottom:16,maxWidth:280,lineHeight:1.6,fontFamily:"'Azeret Mono',monospace"},
  label:{position:"absolute",top:36,left:0,right:0,textAlign:"center",pointerEvents:"none",transition:"opacity .6s ease",fontFamily:"'Azeret Mono',monospace"},
  ctrls:{position:"absolute",bottom:0,left:0,right:0,padding:"50px 20px 36px",background:"linear-gradient(to top,rgba(8,10,16,0.88) 0%,transparent 100%)",display:"flex",flexDirection:"column",alignItems:"center",gap:14,transition:"opacity .4s ease,transform .4s ease"},
  mBtn:{display:"flex",flexDirection:"column",alignItems:"center",padding:"10px 20px 8px",borderRadius:10,border:"1px solid",cursor:"pointer",fontFamily:"'Azeret Mono',monospace",fontSize:10,letterSpacing:1.5,transition:"all .35s ease",background:"none"},
  stop:{fontFamily:"'Azeret Mono',monospace",fontSize:9,letterSpacing:3,color:"#556",background:"none",border:"1px solid rgba(255,255,255,0.06)",borderRadius:20,padding:"7px 24px",cursor:"pointer"},
  hint:{position:"absolute",bottom:8,left:0,right:0,textAlign:"center",fontSize:8,color:"#2A2D34",letterSpacing:1,pointerEvents:"none",fontFamily:"'Azeret Mono',monospace"},
};

ReactDOM.createRoot(document.getElementById("root")).render(<Lucid/>);
</script>
</body>
</html>
